version: '3.8'

services:
  ai_service:
    build:
      context: ./ai_service
      args:
        HF_TOKEN: ${HF_TOKEN}

    container_name: ai_image_studio_ai_service
    restart: always

    ports:
      - "8000:8000"

    environment:
      - HOME=/app
      - HF_HOME=/app/models/huggingface
      - TRANSFORMERS_CACHE=/app/models/huggingface

    volumes:
      - ./ai_service:/app
      - ./ai_service/models:/app/models

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  frontend:
    build:
      context: ./frontend
    container_name: ai_image_studio_frontend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - HOME=/app
    volumes:
      - ./frontend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s