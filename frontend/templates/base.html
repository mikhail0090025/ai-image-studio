<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}AI Image Studio{% endblock %}</title>

  <link rel="stylesheet" href="/static/css/styles.css">

  {% block head %}{% endblock %}
</head>

<body>

  <header class="header">
    <div class="logo">
      <img src="/static/images/logo.png" alt="AI Image Studio" />
      <span>AI Image Studio</span>
    </div>

    <nav class="nav">
      <a href="/">Upload</a>
      <a href="/editor">Editor</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>AI Image Studio © {{ 2026 }}</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
