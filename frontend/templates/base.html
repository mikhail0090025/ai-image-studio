<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}AI Image Studio{% endblock %}</title>
  <link rel="icon" href="/static/images/logo_small.png" sizes="32x32" type="image/png">
  <link rel="stylesheet" href="/static/css/styles.css">
  {% block head %}{% endblock %}
</head>

<body>

  <header class="header">
    <div class="logo">
      <img src="/static/images/logo_small.png" alt="AI Image Studio" />
      <div>
        <span class="brand">AI Image Studio</span>
        <div class="brand-subtitle">Create, edit, and compose images with style</div>
      </div>
    </div>

    <nav class="nav">
      <a href="/" class="nav-link">
        <span class="nav-icon">⬆️</span>
        <span>Upload</span>
      </a>
      <a href="/editor" class="nav-link">
        <span class="nav-icon">🖌️</span>
        <span>Editor</span>
      </a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>AI Image Studio © {{ 2026 }}</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
